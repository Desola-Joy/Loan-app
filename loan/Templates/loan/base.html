<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan App</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }

        nav{
            background:#0b0b8f;
            padding:15px;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-right:20px;
            font-weight:bold;
        }

        .container{
            width:80%;
            margin:auto;
            padding:20px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input, select{
            width:100%;
            padding:12px;
            margin-bottom:15px;
        }

        button{
            background:#0b0b8f;
            color:white;
            border:none;
            padding:12px 20px;
            cursor:pointer;
            width:100%;
        }

        button:hover{
            background:#000066;
        }
    </style>
</head>

<body>

<nav>

    <a href="{% url 'home' %}">Home</a>

    <a href="{% url 'dashboard' %}">Dashboard</a>

    {% if user.is_authenticated %}

        <a href="{% url 'logout' %}">Logout</a>

    {% else %}

        <a href="{% url 'login' %}">Login</a>

        <a href="{% url 'signup' %}">Sign Up</a>

    {% endif %}

</nav>

<div class="container">

    {% if messages %}

        {% for message in messages %}

            <div class="card">
                {{ message }}
            </div>

        {% endfor %}

    {% endif %}

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
